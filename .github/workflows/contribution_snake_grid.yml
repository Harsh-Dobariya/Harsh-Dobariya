name: Generate Snake Animation

on:
  # run automatically every 4 hours
  # schedule:
  #   - cron: "*/3 * * * *"
  
  # allows to run the job at any time manually
  workflow_dispatch:
  
  # run on every push on the main branch
  # push:
  #  branches:
  #   - main

jobs:
  generate:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution_snake_grid.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/contribution_snake_grid.svg
            dist/contribution_snake_grid_dark.svg?palette=github-dark
            dist/contribution_snake_grid_darkBlue.svg?palette=github-dark&color_snake=#3c7dd9
            dist/contribution_snake_grid_ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push contribution_snake_grid.svg to the contribution branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: contribution
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
